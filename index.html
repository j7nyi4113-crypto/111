<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <title>飞机大战</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app" id="app">
      <header class="topbar">
        <div class="brand">
          <div class="logo" aria-hidden="true"></div>
          <div class="title-wrap">
            <div class="title">飞机大战</div>
            <div class="subtitle">WASD/方向键移动，空格射击；鼠标/触摸可拖动</div>
          </div>
        </div>

        <div class="hud" role="status" aria-live="polite">
          <div class="chip">
            <span class="chip-label">分数</span>
            <span class="chip-value" id="score">0</span>
          </div>
          <div class="chip">
            <span class="chip-label">生命</span>
            <span class="chip-value" id="lives">3</span>
          </div>
          <div class="chip chip-muted">
            <span class="chip-label">难度</span>
            <span class="chip-value" id="difficulty">1.0×</span>
          </div>
        </div>

        <div class="actions">
          <button class="btn" id="btnStart" type="button">开始</button>
          <button class="btn" id="btnPause" type="button" disabled>暂停</button>
          <button class="btn btn-secondary" id="btnRestart" type="button" disabled>重新开始</button>
        </div>
      </header>

      <main class="stage">
        <div class="canvas-shell">
          <canvas id="game" width="960" height="540" aria-label="飞机大战游戏画面"></canvas>
          <div class="overlay" id="overlay" hidden>
            <div class="card">
              <div class="card-title" id="overlayTitle">飞机大战</div>
              <div class="card-text" id="overlayText">点击开始进入游戏</div>
              <div class="card-actions">
                <button class="btn" id="btnOverlayPrimary" type="button">开始</button>
                <button class="btn btn-secondary" id="btnOverlaySecondary" type="button">操作说明</button>
              </div>
              <div class="help" id="help" hidden>
                <div class="help-grid">
                  <div class="help-item">
                    <div class="help-k">移动</div>
                    <div class="help-v">WASD / 方向键 / 鼠标拖动 / 触摸拖动</div>
                  </div>
                  <div class="help-item">
                    <div class="help-k">射击</div>
                    <div class="help-v">空格（或自动连射）</div>
                  </div>
                  <div class="help-item">
                    <div class="help-k">暂停</div>
                    <div class="help-v">P / ESC</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>

      <footer class="footer">
        <div class="footer-left">
          提示：如果浏览器拦截本地文件音频/字体无关紧要，本游戏不依赖外部资源。
        </div>
        <div class="footer-right">
          <span class="kbd">P</span> 暂停
          <span class="sep">·</span>
          <span class="kbd">空格</span> 射击
        </div>
      </footer>
    </div>

    <script src="./game.js"></script>
  </body>
</html>
